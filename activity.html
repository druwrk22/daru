<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDARU - Activity</title>
    <link rel="icon" href="assets/img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/showcase.css">
    <style>
        .activity-card {
            border: var(--brutal-border-thick);
            box-shadow: var(--brutal-shadow);
            background: white;
            margin-bottom: 2rem;
            transition: transform 0.2s;
        }
        .activity-img-container {
            border-bottom: var(--brutal-border-thick);
            overflow: hidden;
        }
        .activity-img {
            width: 100%;
            height: auto;
            display: block;
        }
        .activity-caption {
            padding: 1.5rem;
            font-family: 'Space Grotesk', sans-serif;
        }
        .activity-date {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            background: var(--brutal-yellow);
            padding: 2px 8px;
            display: inline-block;
            margin-bottom: 0.5rem;
            border: 2px solid #000;
        }
        .activity-text {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #000;
            margin: 0;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar-brutal">
        <div class="container d-flex align-items-center">
            <a class="navbar-brand-brutal" href="index.html">← BACK</a>
            <div class="ms-auto">
                <span class="nav-link-brutal">Activity Log</span>
            </div>
        </div>
    </nav>

    <!-- HEADER -->
    <header class="showcase-header">
        <div class="container">
            <h1 class="showcase-title">Activity</h1>
            <p class="showcase-subtitle">Snapshots of my daily work, events, and milestones.</p>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container py-5">
        <div class="row justify-content-center">
            <div id="activityList" class="row"></div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="contact-brutal">
        <div class="container text-center">
            <p style="font-family:'Space Mono'; margin:0;">Copyright © 2026 druwrk22</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            const activities = [
                {
                    image: "assets/img/activity/act_1.webp",
                },
                {
                    image: "assets/img/activity/act_2.webp",
                },
                {
                    image: "assets/img/activity/act_3.webp",
                },
                {
                    image: "assets/img/activity/act_4.webp",
                },
                {
                    image: "assets/img/activity/act_5.webp",
                }
            ];

            let html = '';
            activities.forEach(act => {
                html += `
                <div class="col-lg-4">
                    <div class="activity-card">
                        <div class="activity-img-container">
                            <img src="${act.image}" class="activity-img" alt="Activity Image">
                        </div>
                    </div>
                </div>`;
            });
            $('#activityList').html(html);
        });
    </script>
</body>
</html>
